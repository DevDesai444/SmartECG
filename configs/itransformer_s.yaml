defaults: base.yaml

model:
  name: itransformer
  d_model: 64
  n_heads: 4
  n_layers: 2
  d_ff: 256
  dropout: 0.1

# joint loss is unbalanced at the default 1.0/1.0:
# - MSE backprops through 12 * 500 = 6,000 forecast dims per sample
# - BCE backprops through 5 class logits
# even though the scalar magnitudes are comparable (~1.0 vs ~0.4), the encoder
# settles into uniform attention across leads (entropy near log(12)) because
# that minimizes per-lead reconstruction without needing any inter-lead
# structure. STEMI sensitivity collapses to ~0.01 as a result.
# alpha=0.05, beta=2.0 flips the BCE weight ~17x relative to MSE and recovers
# both lead-specific attention (entropy 2.21 in the deepest layer) and STEMI
# behavior (sensitivity 0.037, 4x baseline).
train:
  loss_alpha: 0.05
  loss_beta: 2.0
